name: publish

on:
  push:
    branches: [main]
    tags:
      - "*.*.*"
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install npm deps (via Deno nodeModulesDir)
        run: deno install --allow-scripts
      - name: Verify version parity
        run: |
          deno_version=$(jq -r .version deno.json)
          npm_version=$(jq -r .version package.json)
          if [ "$deno_version" != "$npm_version" ]; then
            echo "::error::Version mismatch: deno.json=$deno_version, package.json=$npm_version"
            exit 1
          fi
          echo "Versions in sync: $deno_version"
      - name: Validate JSR package
        run: deno publish --dry-run --allow-slow-types
      - name: Validate npm package
        run: npm publish --dry-run --access public --provenance

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install npm deps (via Deno nodeModulesDir)
        run: deno install --allow-scripts
      - name: Publish JSR package
        run: deno publish --allow-slow-types

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public --provenance
