name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install npm deps (via Deno nodeModulesDir)
        run: deno install --allow-scripts
      - name: Build
        run: deno task build
      - name: Tests
        run: deno task test
      - name: Typecheck
        run: deno task check
